[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build"

[variables]
NIXPACKS_NODE_VERSION = "20"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "atomicbot"
